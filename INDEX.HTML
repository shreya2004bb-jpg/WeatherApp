<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="day">

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- SUN -->
<div class="sun"></div>

<!-- MOON -->
<div class="moon"></div>

<div class="container">

  <div class="top">

    <div class="logo">
      🌤 SkyCast Weather
    </div>

    <div class="search-box">

      <input
      type="text"
      id="cityInput"
      placeholder="Search city..."
      >

      <button id="searchBtn">
        Search
      </button>

      <button id="locationBtn">
        📍 My Location
      </button>

    </div>

  </div>

  <div id="error"></div>

  <div class="weather-box" id="weatherBox">

    <div class="loader"></div>

  </div>

  <div class="forecast-title">
    📅 5 Day Forecast
  </div>

  <div class="forecast" id="forecastBox"></div>

</div>

<script>

const API_KEY =
"b5941370cf5ae22588e4cdb1b95c25cc";

const weatherBox =
document.getElementById("weatherBox");

const forecastBox =
document.getElementById("forecastBox");

const errorBox =
document.getElementById("error");

const cityInput =
document.getElementById("cityInput");

const searchBtn =
document.getElementById("searchBtn");

const locationBtn =
document.getElementById("locationBtn");

/* ================= STARS ================= */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<150;i++){

  const star =
  document.createElement("div");

  star.classList.add("star");

  star.style.top =
  Math.random()*100 + "%";

  star.style.left =
  Math.random()*100 + "%";

  star.style.animationDuration =
  (Math.random()*3+2)+"s";

  starsContainer.appendChild(star);

}

/* ================= ERROR ================= */

function showError(message){

  errorBox.innerHTML = `
    <div class="error">
      ⚠ ${message}
    </div>
  `;

  setTimeout(()=>{

    errorBox.innerHTML = "";

  },3000);

}

/* ================= LOADER ================= */

function showLoader(){

  weatherBox.innerHTML = `
    <div class="loader"></div>
  `;

}

/* ================= EXACT TIME ================= */

function getCityTime(timezone){

  const now = new Date();

  const utc =
    now.getTime() +
    (now.getTimezoneOffset()*60000);

  const cityDate =
    new Date(utc + timezone*1000);

  return cityDate.toLocaleString([],{
    weekday:'short',
    day:'2-digit',
    month:'short',
    year:'numeric',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit'
  });

}

/* ================= DAY NIGHT ================= */

function setTheme(icon){

  if(icon.includes("n")){

    document.body.classList.remove("day");

    document.body.classList.add("night");

  }else{

    document.body.classList.remove("night");

    document.body.classList.add("day");

  }

}

/* ================= WEATHER UI ================= */

function renderWeather(data){

  const icon =
  data.weather[0].icon;

  setTheme(icon);

  weatherBox.innerHTML = `

    <div class="city-time">

      <div class="city">
        ${data.name}, ${data.sys.country}
      </div>

      <div class="time">
        🕒 ${getCityTime(data.timezone)}
      </div>

    </div>

    <div class="main-weather">

      <div class="left-weather">

        <img
        src="https://openweathermap.org/img/wn/${icon}@4x.png"
        >

        <div>

          <div class="temp">
            ${Math.round(data.main.temp)}°C
          </div>

          <div class="desc">
            ${data.weather[0].description}
          </div>

        </div>

      </div>

      <div class="details">

        <div class="card">
          <div class="card-title">
            💧 Humidity
          </div>

          <div class="card-value">
            ${data.main.humidity}%
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            🌬 Wind Speed
          </div>

          <div class="card-value">
            ${data.wind.speed} m/s
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            🌡 Feels Like
          </div>

          <div class="card-value">
            ${Math.round(data.main.feels_like)}°C
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            ☁ Pressure
          </div>

          <div class="card-value">
            ${data.main.pressure} hPa
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            👀 Visibility
          </div>

          <div class="card-value">
            ${(data.visibility/1000).toFixed(1)} km
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            🌅 Sunrise
          </div>

          <div class="card-value">
            ${new Date(
              data.sys.sunrise*1000
            ).toLocaleTimeString([],{
              hour:'2-digit',
              minute:'2-digit'
            })}
          </div>
        </div>

      </div>

    </div>

  `;

}

/* ================= FORECAST ================= */

function renderForecast(list){

  forecastBox.innerHTML = "";

  const dailyData = [];

  for(let i=0;i<list.length;i+=8){

    dailyData.push(list[i]);

  }

  dailyData.slice(0,5).forEach(day=>{

    const date =
    new Date(day.dt*1000);

    const dayName =
    date.toLocaleDateString([],{
      weekday:'short'
    });

    forecastBox.innerHTML += `

      <div class="forecast-card">

        <div class="forecast-day">
          ${dayName}
        </div>

        <img
        src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png"
        >

        <h2>
          ${Math.round(day.main.temp)}°C
        </h2>

        <p>
          ${day.weather[0].description}
        </p>

      </div>

    `;

  });

}

/* ================= CITY WEATHER ================= */

async function getWeather(city){

  try{

    showLoader();

    const weatherResponse =
    await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
    );

    if(!weatherResponse.ok){

      throw new Error(
        "City not found"
      );

    }

    const weatherData =
    await weatherResponse.json();

    const forecastResponse =
    await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`
    );

    const forecastData =
    await forecastResponse.json();

    renderWeather(weatherData);

    renderForecast(
      forecastData.list
    );

  }
  catch(error){

    showError(error.message);

  }

}

/* ================= LOCATION WEATHER ================= */

async function getLocationWeather(lat,lon){

  try{

    showLoader();

    const weatherResponse =
    await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
    );

    const weatherData =
    await weatherResponse.json();

    const forecastResponse =
    await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
    );

    const forecastData =
    await forecastResponse.json();

    renderWeather(weatherData);

    renderForecast(
      forecastData.list
    );

  }
  catch(error){

    showError(
      "Location weather failed"
    );

  }

}

/* ================= SEARCH ================= */

searchBtn.addEventListener("click",()=>{

  const city =
  cityInput.value.trim();

  if(city){

    getWeather(city);

  }else{

    showError(
      "Enter city name"
    );

  }

});

/* ================= ENTER ================= */

cityInput.addEventListener(
  "keypress",
  (e)=>{

    if(e.key==="Enter"){

      searchBtn.click();

    }

});

/* ================= MY LOCATION ================= */

locationBtn.addEventListener(
  "click",
  ()=>{

  if(!navigator.geolocation){

    showError(
      "Geolocation not supported"
    );

    return;

  }

  showLoader();

  navigator.geolocation.getCurrentPosition(

    async(position)=>{

      const lat =
      position.coords.latitude;

      const lon =
      position.coords.longitude;

      await getLocationWeather(
        lat,
        lon
      );

    },

    (error)=>{

      if(error.code===1){

        showError(
          "Please allow location access"
        );

      }
      else if(error.code===2){

        showError(
          "Location unavailable"
        );

      }
      else if(error.code===3){

        showError(
          "Location timeout"
        );

      }
      else{

        showError(
          "Location failed"
        );

      }

    },

    {
      enableHighAccuracy:true,
      timeout:15000,
      maximumAge:0
    }

  );

});

/* ================= DEFAULT ================= */

getWeather("Kolkata");
/* ================= PERFECT MY LOCATION ================= */

locationBtn.addEventListener("click", () => {

  /* HTTPS CHECK */

  if (
    location.protocol !== "https:" &&
    location.hostname !== "localhost" &&
    location.hostname !== "127.0.0.1"
  ) {

    showError(
      "Location works only on HTTPS or localhost"
    );

    return;

  }

  /* GEOLOCATION SUPPORT */

  if (!navigator.geolocation) {

    showError(
      "Geolocation is not supported"
    );

    return;

  }

  /* SHOW LOADER */

  weatherBox.innerHTML = `
    <div class="loader"></div>
  `;

  /* REQUEST LOCATION */

  navigator.geolocation.getCurrentPosition(

    /* SUCCESS */

    async (position) => {

      try {

        const lat =
        position.coords.latitude;

        const lon =
        position.coords.longitude;

        /* CURRENT WEATHER */

        const weatherRes =
        await fetch(

          `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`

        );

        if (!weatherRes.ok) {

          throw new Error(
            "Weather fetch failed"
          );

        }

        const weatherData =
        await weatherRes.json();

        /* FORECAST */

        const forecastRes =
        await fetch(

          `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`

        );

        if (!forecastRes.ok) {

          throw new Error(
            "Forecast fetch failed"
          );

        }

        const forecastData =
        await forecastRes.json();

        /* UPDATE UI */

        renderWeather(weatherData);

        renderForecast(
          forecastData.list
        );

        /* AUTO FILL CITY */

        cityInput.value =
        weatherData.name;

      }

      catch (error) {

        console.log(error);

        showError(
          "Failed to load your location weather"
        );

      }

    },

    /* ERROR */

    (error) => {

      console.log(error);

      /* PERMISSION DENIED */

      if (error.code === error.PERMISSION_DENIED) {

        showError(
          "Please click ALLOW for location access"
        );

      }

      /* POSITION UNAVAILABLE */

      else if (
        error.code === error.POSITION_UNAVAILABLE
      ) {

        showError(
          "Turn ON device GPS / Location"
        );

      }

      /* TIMEOUT */

      else if (
        error.code === error.TIMEOUT
      ) {

        showError(
          "Location request timed out"
        );

      }

      else {

        showError(
          "Unable to detect location"
        );

      }

    },

    /* OPTIONS */

    {
      enableHighAccuracy: true,
      timeout: 25000,
      maximumAge: 0
    }

  );

});

</script>

</body>
</html>
